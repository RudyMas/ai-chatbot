<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>LocalAI Bot</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 900px;
            margin: 24px auto;
            padding: 0 16px;
        }

        .row {
            display: flex;
            gap: 8px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        textarea {
            width: 100%;
            height: 90px;
        }

        input[type="text"], select {
            width: 100%;
        }

        #log {
            white-space: pre-wrap;
            border: 1px solid #ddd;
            padding: 12px;
            border-radius: 8px;
            min-height: 220px;
            background: #fafafa;
        }

        button {
            padding: 8px 12px;
        }

        .muted {
            color: #666;
            font-size: 0.9em;
        }

        #player {
            width: 100%;
            margin-top: 8px;
        }

        pre {
            background: #111;
            color: #9f9;
            padding: 8px;
            border-radius: 6px;
            overflow: auto;
        }
    </style>
</head>
<body>
<h1>LocalAI Bot</h1>

<div class="row">
    <input id="user" type="text" placeholder="Username" value="User"/>
    <input id="session" type="text" placeholder="Session (optional)"/>
</div>

<div class="row">
    <label style="min-width: 90px;">Profile</label>
    <select id="profile"></select>
    <button onclick="applyProfile()">Apply Profile</button>
    <span id="profileActive" class="muted"></span>
</div>

<div class="row">
    <label><input type="checkbox" id="tts"> TTS</label>
    <label style="margin-left: 12px;"><input type="checkbox" id="stt"> STT</label>
    <button onclick="toggleFlags()">Apply</button>
    <span id="flags" class="muted"></span>
</div>

<div class="row">
    <button id="btnOpenViewer">🗔 Open Voice Viewer</button>
    <button id="btnOpenChat">💬 Open Chat</button>
    <button id="btnOpenMailAdmin">📬 Open Mail Admin</button>
    <button id="btnDemoSpeak">💡 Demo: Let Jarvis Speak</button>
</div>

<div class="row">
    <button id="btnSpeak">🔊 Speak last reply</button>
    <button id="btnRecord">🎤 Start Recording</button>
    <button id="btnDebug">🪲 Debug</button>
    <button id="btnDebugOpen">🪲 Open Debug JSON</button>
    <button id="btnExport">⬇️ Export Memory</button>
    <label>⬆️ Import Memory <input type="file" id="fileImport"/></label>
</div>

<audio id="player" controls style="display:none"></audio>

<h3>Chat</h3>
<textarea id="msg" placeholder="Type a message…"></textarea>
<div class="row">
    <button onclick="send()">Send</button>
</div>

<h3>Remember</h3>
<input id="fact" type="text" placeholder="Fact to remember. Use #tags like #global"/>
<div class="row">
    <button onclick="remember()">Save Fact</button>
</div>

<h3>Memory Manager</h3>
<div class="row">
    <button id="btnMemList">📜 List Memory</button>
    <button id="btnMemFlush">🗑 Flush (user+session)</button>
    <button id="btnMemClean">🧹 Clean (keep 200)</button>
    <span id="memStatus" class="muted"></span>
</div>

<div id="memList"></div>

<h3>Transcript</h3>
<div id="log"></div>

<h3 style="margin-top:16px;">Debug</h3>
<pre id="debugOut" style="display:none"></pre>

<script>
    async function loadProfiles() {
        const res = await fetch('/profiles');
        const data = await res.json();
        const sel = document.getElementById('profile');
        sel.innerHTML = '';
        data.profiles.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            if (p === data.active) opt.selected = true;
            sel.appendChild(opt);
        });
        document.getElementById('profileActive').textContent = `active: ${data.active}`;
    }

    async function applyProfile() {
        const p = document.getElementById('profile').value;
        const res = await fetch('/profile/select', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({profile: p})
        });
        if (!res.ok) {
            const t = await res.text();
            appendLog("ERROR switching profile: " + t);
            return;
        }
        const data = await res.json();
        document.getElementById('profileActive').textContent = `active: ${data.active}`;
        appendLog(`✓ Profile switched to ${data.active}.`);
    }

    async function send() {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || null;
        const message = document.getElementById('msg').value.trim();
        if (!message) return;

        appendLog(user + ": " + message);
        document.getElementById('msg').value = "";

        const res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message, user, session})
        });
        if (!res.ok) {
            const t = await res.text();
            appendLog("ERROR: " + t);
            return;
        }
        const data = await res.json();
        appendLog(`Assistant (${data.profile}): ` + data.answer);
        document.getElementById('tts').checked = data.tts_enabled;
        document.getElementById('stt').checked = data.stt_enabled;
        document.getElementById('flags').textContent = `tts=${data.tts_enabled} stt=${data.stt_enabled}`;
    }

    async function remember() {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || null;
        const text = document.getElementById('fact').value.trim();
        if (!text) return;
        document.getElementById('fact').value = "";

        const res = await fetch('/remember', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text, user, session})
        });
        const data = await res.json();
        appendLog("✓ Remembered: " + data.stored.text + " [" + (data.stored.tags || []).join(", ") + "]");
    }

    async function toggleFlags() {
        const tts = document.getElementById('tts').checked;
        const stt = document.getElementById('stt').checked;
        const res = await fetch('/toggle', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({tts, stt})
        });
        const data = await res.json();
        document.getElementById('flags').textContent = `tts=${data.tts_enabled} stt=${data.stt_enabled}`;
    }

    // ---- New: Speak last reply ----
    document.getElementById('btnSpeak').onclick = async () => {
        const lastAssistant = [...document.querySelectorAll('#log')][0]
            .textContent.split('\n')
            .filter(l => l.startsWith('Assistant'))
            .pop();
        if (!lastAssistant) {
            alert('No assistant reply to speak.');
            return;
        }
        const text = lastAssistant.replace(/^Assistant.*?:\s*/, '').trim();
        const resp = await fetch('/speak?' + new URLSearchParams({text}), {method: 'POST'});
        if (!resp.ok) {
            alert('TTS: ' + (await resp.text()));
            return;
        }
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.getElementById('player');
        a.src = url;
        a.style.display = 'block';
        a.play();
    };

    // ---- New: Live STT (press, talk, release) ----
    let mediaRec = null, chunks = [], currentStream = null, recording = false;

    document.getElementById('btnRecord').onclick = async () => {
        if (!document.getElementById('stt').checked) {
            alert('Enable STT first.');
            return;
        }

        if (!recording) {
            // START
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({audio: true});
            } catch (e) {
                appendLog('Mic error: ' + e);
                return;
            }
            chunks = [];
            mediaRec = new MediaRecorder(currentStream);
            mediaRec.ondataavailable = ev => {
                if (ev.data && ev.data.size > 0) chunks.push(ev.data);
            };
            mediaRec.start();
            recording = true;
            document.getElementById('btnRecord').textContent = '⏹ Stop Recording';
        } else {
            // STOP
            mediaRec.onstop = async () => {
                try {
                    const blob = new Blob(chunks, {type: mediaRec.mimeType || 'audio/webm'});
                    if (!blob || blob.size < 4000) {
                        appendLog('STT: recording too short or empty.');
                        cleanupRec();
                        return;
                    }
                    const file = new File([blob], 'audio.webm', {type: blob.type || 'audio/webm'});
                    const fd = new FormData();
                    fd.append('file', file);
                    const r = await fetch('/transcribe', {method: 'POST', body: fd});
                    if (!r.ok) {
                        appendLog('STT ERROR: ' + await r.text());
                        cleanupRec();
                        return;
                    }
                    const js = await r.json();
                    if (js.text) {
                        document.getElementById('msg').value = js.text;
                        send();
                    } else {
                        appendLog('STT: no text recognized.');
                    }
                } catch (e) {
                    appendLog('STT exception: ' + e);
                } finally {
                    cleanupRec();
                }
            };
            mediaRec.stop();
        }
    };

    function cleanupRec() {
        recording = false;
        document.getElementById('btnRecord').textContent = '🎤 Start Recording';
        try {
            if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
        } catch (e) {
        }
        mediaRec = null;
        chunks = [];
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            currentStream = null;
        }
    }

    // ---- New: Debug ----
    document.getElementById('btnDebug').onclick = async () => {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || 'api';
        const url = '/debug/context?' + new URLSearchParams({user, session});
        const r = await fetch(url);
        if (!r.ok) {
            appendLog('Debug: ' + await r.text());
            return;
        }
        const js = await r.json();
        const pre = document.getElementById('debugOut');
        pre.textContent = JSON.stringify(js, null, 2);
        pre.style.display = 'block';

        // also show a quick summary in the log
        appendLog(`🪲 Debug — profile=${js.active_profile}, user=${js.user_name}, session=${js.session}, turns=${(js.short_term_turns || []).length}`);
    };

    document.getElementById('btnDebugOpen').onclick = () => {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || 'api';
        const url = '/debug/context?' + new URLSearchParams({user, session});
        window.open(url, '_blank');
    };

    // ---- New: Export/Import Memory ----
    document.getElementById('btnExport').onclick = async () => {
        const r = await fetch('/memory/export');
        if (!r.ok) {
            alert('Export failed: ' + await r.text());
            return;
        }
        const blob = await r.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'rag_export.jsonl';
        a.click();
        URL.revokeObjectURL(url);
    };

    document.getElementById('fileImport').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append('file', file);
        const r = await fetch('/memory/import', {method: 'POST', body: fd});
        if (!r.ok) {
            alert('Import failed: ' + await r.text());
            return;
        }
        const js = await r.json();
        appendLog(`✓ Import ok (${js.bytes_appended} bytes).`);
        e.target.value = '';
    });

    document.getElementById('btnOpenViewer').onclick = async () => {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || 'api';
        const profile = document.getElementById('profile').value || 'default';
        const tts = document.getElementById('tts').checked ? '1' : '0';
        const stt = document.getElementById('stt').checked ? '1' : '0';

        // Ask the server for the configured language
        let lang = 'en-US';
        try {
            const r = await fetch('/debug/context?' + new URLSearchParams({user, session}));
            if (r.ok) {
                const js = await r.json();
                lang = js.identity_language || lang;
            }
        } catch (e) {
            // ignore and keep default
            console.warn('debug/context fetch failed', e);
        }

        const url = '/static/viewer.html?' + new URLSearchParams({user, session, profile, tts, stt, lang});
        window.open(url, '_blank');
    };

    document.getElementById('btnOpenMailAdmin').onclick = () => {
        window.open('/admin', '_blank');
    };

    document.getElementById('btnOpenChat').onclick = async () => {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || 'api';
        const profile = document.getElementById('profile').value || 'default';
        const tts = document.getElementById('tts').checked ? '1' : '0';
        const stt = document.getElementById('stt').checked ? '1' : '0';

        // try to fetch identity language from /debug/context (optional)
        let lang = 'en-US';
        try {
            const r = await fetch('/debug/context?' + new URLSearchParams({user, session}));
            if (r.ok) {
                const js = await r.json();
                lang = js.identity_language || lang;
            }
        } catch (_) {
        }

        const url = '/static/chat.html?' + new URLSearchParams({user, session, profile, tts, stt, lang});
        window.open(url, '_blank');
    };


    function appendLog(line) {
        const el = document.getElementById('log');
        el.textContent += (el.textContent ? "\n" : "") + line;
        el.scrollTop = el.scrollHeight;
    }

    // ===== Memory Manager UI =====
    let memQuery = {offset: 0, limit: 50}; // pagination state

    function trimText(s, n = 500) {
        if (!s) return "";
        s = String(s);
        return s.length > n ? s.slice(0, n - 1) + "…" : s;
    }

    function memControlsHTML() {
        return `
    <div class="row" style="margin-top:8px;">
      <button id="btnMemRefresh">↻ Refresh</button>
      <button id="btnMemMore">➕ Load more</button>
      <button id="btnMemDeleteSel">❌ Delete selected</button>
    </div>
  `;
    }

    function renderMemoryList(payload) {
        const cont = document.getElementById('memList');
        const items = payload.items || [];
        const total = payload.total || 0;

        const table = `
    <table style="width:100%; border-collapse:collapse; font-size:14px;">
      <thead>
        <tr>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">
            <input id="memChkAll" type="checkbox"/>
          </th>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">idx</th>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">ts</th>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">type</th>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">tags</th>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">session</th>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">text</th>
          <th style="text-align:left; padding:6px; border-bottom:1px solid #ddd;">action</th>
        </tr>
      </thead>
      <tbody>
        ${items.map(it => `
          <tr data-idx="${it.idx}">
            <td style="padding:6px; border-bottom:1px solid #eee;">
              <input class="memChk" type="checkbox" data-idx="${it.idx}"/>
            </td>
            <td style="padding:6px; border-bottom:1px solid #eee;">${it.idx}</td>
            <td style="padding:6px; border-bottom:1px solid #eee;">${it.ts || ''}</td>
            <td style="padding:6px; border-bottom:1px solid #eee;">${it.type || ''}</td>
            <td style="padding:6px; border-bottom:1px solid #eee;">${(it.tags || []).join(', ')}</td>
            <td style="padding:6px; border-bottom:1px solid #eee;">${it.session || ''}</td>
            <td style="padding:6px; border-bottom:1px solid #eee;">${trimText(it.text || it.note || '')}</td>
            <td style="padding:6px; border-bottom:1px solid #eee;">
              <button class="btnMemDel" data-idx="${it.idx}">Delete</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;

        cont.innerHTML = table + memControlsHTML();

        // status line
        document.getElementById('memStatus').textContent =
            `Showing ${items.length} of ${total} (offset=${memQuery.offset}, limit=${memQuery.limit})`;

        // hook up header checkbox
        const chkAll = document.getElementById('memChkAll');
        chkAll.addEventListener('change', () => {
            document.querySelectorAll('.memChk').forEach(c => c.checked = chkAll.checked);
        });

        // per-row delete
        cont.querySelectorAll('.btnMemDel').forEach(btn => {
            btn.addEventListener('click', async () => {
                const idx = parseInt(btn.getAttribute('data-idx'), 10);
                if (!Number.isFinite(idx)) return;
                if (!confirm(`Delete item idx=${idx}?`)) return;
                const r = await fetch('/memory/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({idx: [idx]})
                });
                if (!r.ok) {
                    appendLog('Delete failed: ' + await r.text());
                    return;
                }
                appendLog(`❌ Deleted idx=${idx}`);
                // Refresh current page
                await loadMemoryList(false);
            });
        });

        // bulk controls
        document.getElementById('btnMemDeleteSel').onclick = async () => {
            const ids = Array.from(document.querySelectorAll('.memChk'))
                .filter(c => c.checked)
                .map(c => parseInt(c.getAttribute('data-idx'), 10))
                .filter(Number.isFinite);
            if (!ids.length) {
                alert('Select at least one item.');
                return;
            }
            if (!confirm(`Delete ${ids.length} selected items?`)) return;

            const r = await fetch('/memory/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({idx: ids})
            });
            if (!r.ok) {
                appendLog('Bulk delete failed: ' + await r.text());
                return;
            }
            const js = await r.json();
            appendLog(`❌ Deleted ${js.removed} items (remaining ${js.remaining})`);
            await loadMemoryList(false);
        };

        document.getElementById('btnMemRefresh').onclick = () => loadMemoryList(false);

        document.getElementById('btnMemMore').onclick = async () => {
            memQuery.offset += memQuery.limit;
            await loadMemoryList(true); // append
        };
    }

    async function loadMemoryList(append = false) {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || '';
        const params = {user, session, offset: memQuery.offset, limit: memQuery.limit};
        const url = '/memory/list?' + new URLSearchParams(params);
        const r = await fetch(url);
        if (!r.ok) {
            appendLog('Memory list error: ' + await r.text());
            return;
        }
        const js = await r.json();

        if (append && document.getElementById('memList').innerHTML.trim()) {
            // merge append into current table (simple way: refetch up to new offset+limit and rerender)
            // to keep code simple and avoid DOM diffing, just rerender with concatenated items
            const prev = document.getElementById('memList').dataset._items
                ? JSON.parse(document.getElementById('memList').dataset._items) : [];
            const combined = prev.concat(js.items);
            const payload = {total: js.total, items: combined};
            document.getElementById('memList').dataset._items = JSON.stringify(combined);
            renderMemoryList(payload);
        } else {
            document.getElementById('memList').dataset._items = JSON.stringify(js.items);
            renderMemoryList(js);
        }
    }

    // Hook existing buttons to the new loader/clean/flush
    document.getElementById('btnMemList').onclick = async () => {
        memQuery.offset = 0;
        await loadMemoryList(false);
    };

    document.getElementById('btnMemFlush').onclick = async () => {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || null;
        if (!confirm(`Flush ALL memory for ${user}${session ? " / " + session : ""}?`)) return;
        const r = await fetch('/memory/flush', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user, session})
        });
        if (!r.ok) {
            appendLog('Memory flush error: ' + await r.text());
            return;
        }
        const js = await r.json();
        appendLog(`🗑 Flushed memory: removed ${js.removed}, remaining ${js.remaining}`);
        memQuery.offset = 0;
        await loadMemoryList(false);
    };

    document.getElementById('btnMemClean').onclick = async () => {
        const user = document.getElementById('user').value || 'User';
        if (!confirm(`Clean memory for ${user} (dedup + keep last 200)?`)) return;
        const r = await fetch('/memory/clean', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user, keep_latest: 200})
        });
        if (!r.ok) {
            appendLog('Memory clean error: ' + await r.text());
            return;
        }
        const js = await r.json();
        appendLog(`🧹 Cleaned memory: removed ${js.removed}, remaining ${js.remaining}`);
        memQuery.offset = 0;
        await loadMemoryList(false);
    };

    document.getElementById('btnDemoSpeak').onclick = async () => {
        const user = document.getElementById('user').value || 'User';
        const session = document.getElementById('session').value || 'api';

        const r = await fetch('/demo/speak', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({user, session})
        });
        if (!r.ok) {
            appendLog('Demo speak error: ' + await r.text());
            return;
        }
        const js = await r.json();
        appendLog(`Assistant (${js.profile}): ` + js.answer);

        // Optional: speak it using your existing /speak endpoint
        try {
            const resp = await fetch('/speak?' + new URLSearchParams({text: js.answer}), {method: 'POST'});
            if (resp.ok) {
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.getElementById('player');
                a.src = url;
                a.style.display = 'block';
                a.play();
            }
        } catch (e) {
        }
    };

    // init
    loadProfiles();
</script>
</body>
</html>
