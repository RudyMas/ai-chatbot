<!doctype html>
<html>
<head>
    <meta charset="utf-8"/>
    <title>Voice Viewer</title>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <style>
        :root {
            --bg: #0b0d10;
            --panel: #101419;
            --text: #e6eef8;
            --muted: #9bb2ca;
            --accent: #6aa9ff;
            --ok: #34d399;
            --warn: #f59e0b;
            --danger: #ef4444;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, sans-serif;
        }

        .wrap {
            display: grid;
            grid-template-rows: 1fr 1fr auto;
            height: 100vh;
        }

        .panel {
            padding: 16px 18px;
        }

        .ai {
            background: var(--panel);
            border-bottom: 1px solid #151b22;
        }

        .user {
            background: #0c1117;
            border-top: 1px solid #151b22;
        }

        h2 {
            margin: 0 0 10px 0;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: .3px;
        }

        .bubble {
            background: #0f1520;
            border: 1px solid #1b2430;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 1.25rem;
            line-height: 1.5;
            white-space: pre-wrap;
            min-height: 72px;
        }

        .bubble.small {
            font-size: 1.1rem;
        }

        .bubble pre {
            background: #0b0f17;
            border: 1px solid #1b2430;
            padding: 12px;
            border-radius: 8px;
            overflow: auto;
        }

        .bubble code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 0.95rem;
        }

        .footer {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 10px 16px;
            background: #0c1117;
            border-top: 1px solid #151b22;
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls label {
            display: inline-flex;
            gap: 8px;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .btn {
            background: #111827;
            color: var(--text);
            border: 1px solid #1f2937;
            border-radius: 10px;
            padding: 8px 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn[disabled] {
            opacity: .5;
            cursor: not-allowed;
        }

        .status {
            font-size: .95rem;
            color: var(--muted);
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }

        .dot.ok {
            background: var(--ok);
        }

        .dot.off {
            background: #374151;
        }

        .dot.speaking {
            background: var(--warn);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, .2);
        }

        .mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        }

        .toast {
            position: fixed;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            background: #111827;
            color: var(--text);
            border: 1px solid #1f2937;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: .95rem;
            display: none;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="panel ai">
        <h2>Assistant (last reply)</h2>
        <div id="aiText" class="bubble"></div>
    </div>
    <div class="panel user">
        <h2>User (last message)</h2>
        <div id="userText" class="bubble small"></div>
    </div>
    <div class="footer">
        <div class="controls">
            <div style="display: block">
                <button id="btnStart" class="btn">▶️ Start Listening</button>
                <button id="btnDemoSpeak" class="btn">💡 Demo Speak</button>
                <button id="btnStopSpeak" class="btn">⏹ Stop Speaking</button>
                <label><input type="checkbox" id="chkBg"> Keep listening in background</label>
            </div>
            <div style="display: block">
                <label><input type="checkbox" id="chkMd" checked> Render Markdown</label>
                <label><input type="checkbox" id="chkIdle" checked> Enable idle nudge</label>
                <label><input type="checkbox" id="chkMute"> Mute AI (store only)</label>
                <label><input type="checkbox" id="chkStop"> Stop Listening</label>
            </div>
        </div>
        <div class="status">
            <div style="display: block">
                <span><span class="dot off" id="dotListen"></span>Listening</span>
                <span><span class="dot off" id="dotSpeak"></span>Speaking</span>
            </div>
            <div style="display: block">
                <span id="stProfile" class="mono"></span>
                <span id="stUser" class="mono"></span>
                <span id="stSession" class="mono"></span>
                <span id="stLang" class="mono"></span>
                <span id="stFlags" class="mono"></span>
                <span id="stTime" class="mono"></span>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<audio id="player" preload="auto" style="display:none"></audio>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
<script>
    // --- Query params & settings ---
    const qp = new URLSearchParams(location.search);
    const settings = {
        user: qp.get('user') || 'User',
        session: qp.get('session') || 'api',
        profile: qp.get('profile') || 'default',
        tts: /^(1|true|yes)$/i.test(qp.get('tts') || ''),
        stt: /^(1|true|yes)$/i.test(qp.get('stt') || ''),
        lang: qp.get('lang') || 'en-US',
        pollMs: 1200,
        maxChars: 300,
        idleSec: 30,
        idleCooldownSec: 120,
        renderMarkdown: true // NEW: toggle for on-screen Markdown
    };

    // UI refs
    const aiText = document.getElementById('aiText');
    const userText = document.getElementById('userText');
    const btnStart = document.getElementById('btnStart');
    const btnDemoSpeak = document.getElementById('btnDemoSpeak');
    const btnStopSpeak = document.getElementById('btnStopSpeak'); // NEW
    const chkMd = document.getElementById('chkMd'); // NEW
    const chkMute = document.getElementById('chkMute');
    const chkStop = document.getElementById('chkStop');
    const chkIdle = document.getElementById('chkIdle');
    const chkBg = document.getElementById('chkBg');
    chkBg.addEventListener('change', () => {
        keepListeningInBackground = chkBg.checked;
    });
    const dotListen = document.getElementById('dotListen');
    const dotSpeak = document.getElementById('dotSpeak');
    const stProfile = document.getElementById('stProfile');
    const stUser = document.getElementById('stUser');
    const stSession = document.getElementById('stSession');
    const stLang = document.getElementById('stLang');
    const stFlags = document.getElementById('stFlags');
    const stTime = document.getElementById('stTime');
    const player = document.getElementById('player');
    const toast = document.getElementById('toast');

    // Store raw last assistant text for re-rendering on toggle
    let lastAssistantRaw = '';
    let assistantName = 'Assistant';

    // --- Markdown -> speakable text (drop code, links, formatting) ---
    function stripCodeFences(md) {
        return (md || '').replace(/```[\s\S]*?```/g, '');
    }

    function replaceInlineCode(md) {
        return md.replace(/`([^`]+)`/g, '“$1”');
    }

    function replaceImages(md) {
        return md.replace(/!\[([^\]]*)\]\([^)]*\)/g, '$1');
    }

    function replaceLinks(md) {
        return md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1');
    }

    function blockquotes(md) {
        return md.replace(/^\s*>\s?/gm, 'Quote: ');
    }

    function listsToBullets(md) {
        return md.replace(/^\s*[-*+]\s+/gm, '• ')
            .replace(/^\s*\d+\.\s+/gm, '• ');
    }

    function stripEmphasis(md) {
        return md.replace(/(\*\*|__)(.*?)\1/g, '$2')
            .replace(/(\*|_)(.*?)\1/g, '$2')
            .replace(/~~(.*?)~~/g, '$1');
    }

    function demoteHeadings(md) {
        return md.replace(/^\s{0,3}#{1,6}\s+/gm, '');
    }

    function stripHtml(htmlish) {
        const div = document.createElement('div');
        div.innerHTML = htmlish;
        return div.textContent || div.innerText || '';
    }

    function normalizeWhitespace(t) {
        return t.replace(/[ \t]+\n/g, '\n')
            .replace(/\n{3,}/g, '\n\n')
            .replace(/[ \t]{2,}/g, ' ')
            .trim();
    }

    function stripAssistantName(text) {
        if (!text || !assistantName) return text;
        const nameRegex = new RegExp(`^${assistantName}:\\s*`, 'i');
        return text.replace(nameRegex, '').trim();
    }

    function sanitizeForTTS(s) {
        // Remove emoji grapheme clusters (incl. ZWJ sequences), flags, skin tones
        return s
            // ZWJ emoji sequences (👩‍💻, family emojis, etc.)
            .replace(/\p{Extended_Pictographic}(?:\uFE0F|\uFE0E)?(?:\u200D\p{Extended_Pictographic}(?:\uFE0F|\uFE0E)?)+/gu, ' ')
            // Standalone pictographs (😀, 🚀, ❤️, etc.)
            .replace(/\p{Extended_Pictographic}(?:\uFE0F|\uFE0E)?/gu, ' ')
            // Skin tone modifiers
            .replace(/[\u{1F3FB}-\u{1F3FF}]/gu, ' ')
            // Regional indicator flags (🇧🇪 etc.)
            .replace(/[\u{1F1E6}-\u{1F1FF}]{2}/gu, ' ')
            // Variation selectors & ZWJ that may linger
            .replace(/[\u200D\uFE0E\uFE0F]/g, ' ')
            // Compact whitespace
            .replace(/\s{2,}/g, ' ')
            .trim();
    }

    function markdownToSpeakable(md) {
        let t = md || '';
        t = stripCodeFences(t);
        t = replaceInlineCode(t);
        t = replaceImages(t);
        t = replaceLinks(t);
        t = blockquotes(t);
        t = listsToBullets(t);
        t = demoteHeadings(t);
        t = stripEmphasis(t);
        t = stripHtml(t);
        t = normalizeWhitespace(t);
        t = stripAssistantName(t);
        t = sanitizeForTTS(t);
        return t;
    }

    // --- On-screen rendering (toggle-aware) ---
    function renderAssistant(md) {
        if (settings.renderMarkdown) {
            const html = marked.parse(md || '', {gfm: true, breaks: true});
            aiText.innerHTML = DOMPurify.sanitize(html, {USE_PROFILES: {html: true}});
        } else {
            aiText.textContent = md || '';
        }
    }

    // Toggle handler
    chkMd.checked = true;
    chkMd.addEventListener('change', () => {
        settings.renderMarkdown = chkMd.checked;
        renderAssistant(lastAssistantRaw);
    });

    function setListen(on) {
        dotListen.className = 'dot ' + (on ? 'ok' : 'off');
    }

    function setSpeak(on) {
        dotSpeak.className = 'dot ' + (on ? 'speaking' : 'off');
    }

    function showToast(msg, ms = 2000) {
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', ms);
    }

    // status bar init
    stProfile.textContent = `profile=${settings.profile}`;
    stUser.textContent = `user=${settings.user}`;
    stSession.textContent = `session=${settings.session}`;
    stLang.textContent = `lang=${settings.lang}`;
    stFlags.textContent = `tts=${settings.tts} stt=${settings.stt}`;

    // --- Poll /debug/context for last turns ---
    let pollTimer = null;

    async function pollDebug() {
        try {
            const url = '/debug/context?' + new URLSearchParams({user: settings.user, session: settings.session});
            const r = await fetch(url);
            if (!r.ok) throw new Error(await r.text());
            const js = await r.json();
            const turns = js.short_term_turns || [];
            // last assistant
            for (let i = turns.length - 1; i >= 0; i--) {
                if (turns[i][0] === 'assistant') {
                    lastAssistantRaw = turns[i][1] || '';
                    renderAssistant(lastAssistantRaw);
                    break;
                }
            }
            // last user
            for (let i = turns.length - 1; i >= 0; i--) {
                if (turns[i][0] === 'user') {
                    userText.textContent = turns[i][1] || '';
                    break;
                }
            }
            stProfile.textContent = `profile=${js.active_profile || settings.profile}`;
            stFlags.textContent = `tts=${js.tts_enabled} stt=${js.stt_enabled}`;
            stTime.textContent = new Date().toLocaleTimeString();
            assistantName = js.identity_name;
        } catch (e) {
            console.warn('debug/context error', e);
        } finally {
            pollTimer = setTimeout(pollDebug, settings.pollMs);
        }
    }

    // --- Web Speech API (continuous with auto-restart) ---
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recog = null;
    let listening = false;
    let manualStop = false;
    let interimText = '';
    let lastHeardAt = 0;        // updated on interim/final results
    let lastRecogEventAt = 0;   // any SR event
    let restartBackoffMs = 400; // grows on repeated errors, capped
    let idleInFlight = false;   // prevents duplicate idle nudges
    let idleCooldownUntil = 0;  // absolute timestamp for cooldown end
    let lastSpokeAt = 0;        // updated when TTS finishes
    let idleTimer = null;       // handle for idle loop interval
    let watchdogTimer = null;   // handle for the watchdog interval
    let lastErrorAt = 0;        // throttle visible error toasts/logs
    let micKeepalive = null;
    let ttsActive = false;      // true while we’re preparing/playing TTS

    // --- TTS Queue ---
    const ttsQueue = [];
    let ttsProcessing = false;
    let restartTimer = null;    // single pending restart timer
    let keepListeningInBackground = false;
    const RESTART_BACKOFF_MAX = 4000;
    const WATCHDOG_IDLE_MS = 36000000;

    // --- Add these with your other SR variables ---
    const SILENCE_FINALIZE_MS = 1200; // try 900–1200
    let pendingFinal = '';           // accumulates true finals until we commit
    let finalizeTimer = null;

    function scheduleFinalizeCommit() {
        if (finalizeTimer) clearTimeout(finalizeTimer);
        finalizeTimer = setTimeout(() => {
            if (pendingFinal.trim()) {
                const text = pendingFinal.trim();
                pendingFinal = '';
                handleFinalTranscript(text);
            }
        }, SILENCE_FINALIZE_MS);
    }

    function bumpActivity() {
        lastRecogEventAt = Date.now();
    }

    function ensureRecog() {
        if (!SR) {
            showToast('Web Speech API not available. Please use Chrome or Edge.');
            return null;
        }
        if (recog) return recog;

        const r = new SR();
        r.lang = settings.lang;
        r.continuous = true;
        r.interimResults = true;
        r.maxAlternatives = 1;

        r.onstart = () => {
            listening = true;
            setListen(true);
            bumpActivity();
            restartBackoffMs = 400;
        };
        r.onaudiostart = bumpActivity;
        r.onsoundstart = bumpActivity;
        r.onspeechstart = bumpActivity;
        r.onsoundend = bumpActivity;
        r.onaudioend = bumpActivity;

        r.onresult = (ev) => {
            bumpActivity();

            let finalChunk = '';
            interimText = '';

            for (let i = ev.resultIndex; i < ev.results.length; i++) {
                const res = ev.results[i];
                if (res.isFinal) {
                    // accumulate final chunks, but don't send yet
                    finalChunk += res[0].transcript + ' ';
                } else {
                    // any interim means you're probably just pausing
                    interimText += res[0].transcript;
                }
            }

            // Update "we heard something" timestamps
            if (interimText) lastHeardAt = Date.now();
            if (finalChunk.trim()) lastHeardAt = Date.now();

            // Buffer finals; only commit after a quiet gap
            if (finalChunk.trim()) {
                pendingFinal += finalChunk;
            }

            // Whether we saw interims or finals, reset the finalize timer.
            // If you keep talking, the timer keeps getting pushed out.
            if (interimText || finalChunk.trim()) {
                scheduleFinalizeCommit();
            }
        };

        r.onerror = (ev) => {
            bumpActivity();
            if (ev.error === 'no-speech' || ev.error === 'network' || ev.error === 'aborted' || ev.error === 'audio-capture') {
                listening = false;
                scheduleRecogRestart();
                return;
            }
            const now = Date.now();
            if (now - lastErrorAt > 10000) {
                console.warn('recog error', ev.error);
                showToast('Speech error: ' + ev.error);
                lastErrorAt = now;
            }
        };

        r.onend = () => {
            setListen(false);
            bumpActivity();
            listening = false;

            // If SR ended while we had buffered text, commit it once.
            if (pendingFinal.trim()) {
                const text = pendingFinal.trim();
                pendingFinal = '';
                handleFinalTranscript(text);
            }

            if (!manualStop && !document.hidden && !speaking()) {
                scheduleRecogRestart();
            }
        };

        recog = r;
        return r;
    }

    function scheduleRecogRestart() {
        if (manualStop) return;
        const delay = restartBackoffMs;
        restartBackoffMs = Math.min(restartBackoffMs * 2, RESTART_BACKOFF_MAX);
        if (restartTimer) clearTimeout(restartTimer);
        restartTimer = setTimeout(() => {
            restartTimer = null;
            tryStartRecog();
        }, delay);
    }

    async function tryStartRecog() {
        const r = ensureRecog();
        if (!r) return;
        if (listening) return;
        if (chkStop.checked || (document.hidden && !keepListeningInBackground) || speaking()) return;
        try {
            manualStop = false;
            r.lang = settings.lang;
            r.start();
            listening = true;
        } catch (e) {
            console.warn('recog start error', e);
            scheduleRecogRestart();
        }
    }

    function stopRecog(manual = true) {
        if (restartTimer) {
            clearTimeout(restartTimer);
            restartTimer = null;
        }
        if (recog) {
            try {
                recog.stop();
            } catch (_) {
            }
        }
        listening = false;
        manualStop = manual;
        stopMicKeepalive();
        setListen(false);
    }

    // --- TTS helper ---
    function speaking() {
        return ttsActive || (!player.paused && !player.ended);
    }

    async function speak(text) {
        queueSpeak(text);
    }

    function queueSpeak(text) {
        if (!settings.tts || !text) {
            lastSpokeAt = Date.now();
            return;
        }
        ttsQueue.push(text);
        if (!ttsProcessing) processTTSQueue();
    }

    // Allow cancel from outside:
    let cancelSpeakOnce = null;
    let currentTTSUrl = null;

    // NEW: Stop Speaking (button + 'S' key)
    function stopSpeaking() {
        try {
            ttsQueue.length = 0;
        } catch {
        }
        if (cancelSpeakOnce) {
            try {
                cancelSpeakOnce();
            } catch {
            } finally {
                cancelSpeakOnce = null;
            }
        }
        try {
            player.pause();
        } catch {
        }
        try {
            player.removeAttribute('src');
            player.load();
        } catch {
        }
        try {
            if (currentTTSUrl) {
                URL.revokeObjectURL(currentTTSUrl);
                currentTTSUrl = null;
            }
        } catch {
        }
        setSpeak(false);
        ttsActive = false;
        ttsProcessing = false;
        lastSpokeAt = Date.now();
        if (!chkStop.checked) tryStartRecog();
    }

    btnStopSpeak.addEventListener('click', stopSpeaking);
    document.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 's' && !e.repeat) stopSpeaking();
    });

    async function processTTSQueue() {
        if (ttsProcessing) return;
        ttsProcessing = true;
        ttsActive = true;
        setSpeak(true);

        // Pause listening once for the whole batch
        stopRecog(false);
        setListen(false);

        try {
            while (ttsQueue.length) {
                const next = ttsQueue.shift();
                await speakOnce(next);  // fetch, play, await end
            }
        } finally {
            setSpeak(false);
            ttsActive = false;
            ttsProcessing = false;
            lastSpokeAt = Date.now();
            if (!chkStop.checked) await tryStartRecog(); // resume after the whole queue
        }
    }

    async function speakOnce(text) {
        try {
            const resp = await fetch('/speak?' + new URLSearchParams({text}), {method: 'POST'});
            if (!resp.ok) {
                showToast('TTS error');
                return;
            }
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            currentTTSUrl = url;
            player.src = url;

            try {
                await player.play();
            } catch (_) {
            }

            await new Promise((resolve) => {
                const cleanup = () => {
                    player.removeEventListener('ended', onEnd);
                    player.removeEventListener('error', onErr);
                    try {
                        URL.revokeObjectURL(currentTTSUrl || url);
                    } catch {
                    }
                    currentTTSUrl = null;
                    resolve();
                };
                cancelSpeakOnce = cleanup;
                const onEnd = () => cleanup();
                const onErr = () => cleanup();
                player.addEventListener('ended', onEnd, {once: true});
                player.addEventListener('error', onErr, {once: true});
            });

            cancelSpeakOnce = null; // consumed
        } catch (e) {
            console.warn('speakOnce error', e);
        }
    }

    player.addEventListener('ended', () => {
        if (!ttsProcessing) {
            setSpeak(false);
            ttsActive = false;
            lastSpokeAt = Date.now();
            if (!chkStop.checked) tryStartRecog();
        }
    });

    player.addEventListener('error', () => {
        if (!ttsProcessing) {
            setSpeak(false);
            ttsActive = false;
        }
    });

    // --- Chat / Remember flow ---
    async function handleFinalTranscript(text) {
        lastHeardAt = Date.now();
        const clipped = text.length > settings.maxChars ? (text.slice(0, settings.maxChars) + '…') : text;

        if (chkMute.checked) {
            const body = {
                message: clipped,
                user: settings.user,
                session: settings.session,
                listen_only: true,
                remember_tags: ["voice", "viewer"]
            };
            const r = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            if (!r.ok) console.warn('listen_only fail', await r.text());
            return;
        }

        const body = {message: clipped, user: settings.user, session: settings.session};
        const r = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        });
        if (!r.ok) {
            showToast('Chat error');
            return;
        }
        const js = await r.json();
        // Show in UI too? The poller will pick it up shortly; optional immediate render:
        lastAssistantRaw = js.answer || '';
        renderAssistant(lastAssistantRaw);

        if (settings.tts) {
            const speakable = markdownToSpeakable(js.answer || '');
            queueSpeak(speakable);
        } else {
            lastSpokeAt = Date.now();
        }
    }

    // --- Idle nudge (single-fire with lock + cooldown) ---
    function startIdleLoop() {
        clearInterval(idleTimer);
        idleTimer = setInterval(async () => {
            const now = Date.now();

            if (document.hidden && keepListeningInBackground) return;
            if (manualStop || chkMute.checked || chkStop.checked || (document.hidden && !keepListeningInBackground) || speaking()) return;
            if (now < idleCooldownUntil) return;

            const silentFor = Math.min(
                now - (lastHeardAt || 0),
                now - (lastSpokeAt || 0)
            );

            if (chkIdle.checked && !idleInFlight && silentFor >= settings.idleSec * 1000) {
                idleInFlight = true;
                idleCooldownUntil = now + settings.idleCooldownSec * 1000;

                try {
                    const prompt = "No one has spoken for 30 seconds; say something brief and relevant.";
                    const body = {message: prompt, user: settings.user, session: settings.session};
                    const r = await fetch('/chat', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(body)
                    });
                    if (r.ok) {
                        const js = await r.json();
                        lastAssistantRaw = js.answer || '';
                        renderAssistant(lastAssistantRaw);

                        if (settings.tts) {
                            const speakable = markdownToSpeakable(js.answer || '');
                            await speak(speakable);
                        } else lastSpokeAt = Date.now();
                    }
                } catch (e) {
                    console.warn('idle nudge error', e);
                } finally {
                    idleInFlight = false;
                }
            }
        }, 1000);
    }

    // --- Recognition watchdog: restart if silent too long (and not speaking) ---
    function startWatchdog() {
        stopWatchdog();
        watchdogTimer = setInterval(() => {
            if (manualStop || (document.hidden && !keepListeningInBackground) || speaking()) return;
            const now = Date.now();
            if (now - lastRecogEventAt > WATCHDOG_IDLE_MS) {
                try {
                    stopRecog(false);
                } catch (_) {
                }
                scheduleRecogRestart();
            }
        }, 2000);
    }

    function stopWatchdog() {
        if (watchdogTimer) {
            clearInterval(watchdogTimer);
            watchdogTimer = null;
        }
    }

    function startListeningTimers() {
        idleCooldownUntil = Date.now() + settings.idleSec * 1000;
        idleInFlight = false;
        startIdleLoop();
        startWatchdog();
    }

    function stopListeningTimers() {
        if (idleTimer) {
            clearInterval(idleTimer);
            idleTimer = null;
        }
        stopWatchdog();
    }

    // --- Start/Stop button & checkboxes ---
    btnStart.addEventListener('click', () => {
        if (!listening) {
            manualStop = false;
            tryStartRecog();
            startMicKeepalive();
            idleCooldownUntil = Date.now() + settings.idleSec * 1000; // grace
            startListeningTimers();
            btnStart.textContent = '⏹ Stop Listening';
        } else {
            stopRecog(true);
            stopListeningTimers();
            btnStart.textContent = '▶️ Start Listening';
        }
    });

    btnDemoSpeak.addEventListener('click', async () => {
        try {
            stopRecog(false);
            const r = await fetch('/demo/speak', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user: settings.user, session: settings.session})
            });
            if (!r.ok) {
                showToast('Demo speak error: ' + await r.text());
                return;
            }
            const js = await r.json();
            lastAssistantRaw = js.answer || '';
            renderAssistant(lastAssistantRaw);
            if (settings.tts && js.answer) {
                const speakable = markdownToSpeakable(js.answer);
                queueSpeak(speakable);
            }
        } catch (e) {
            console.warn('demo speak failed', e);
        } finally {
            if (!chkStop.checked) tryStartRecog(); // resume listening
        }
    });

    chkStop.addEventListener('change', () => {
        if (chkStop.checked) {
            stopRecog(true);
            stopListeningTimers();
            btnStart.textContent = '▶️ Start Listening';
        } else {
            tryStartRecog();
            startMicKeepalive();
            idleCooldownUntil = Date.now() + settings.idleSec * 1000; // grace
            startListeningTimers();
            btnStart.textContent = '⏹ Stop Listening';
        }
    });

    chkIdle.addEventListener('change', () => {
        if (!chkIdle.checked) {
            // disable: clear any pending idle trigger
            idleInFlight = false;
            idleCooldownUntil = Date.now() + settings.idleCooldownSec * 1000;
        }
    });

    // --- Visibility handling ---
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            if (!keepListeningInBackground && listening) {
                stopRecog(false);
                stopListeningTimers();
            }
        } else {
            if (!chkStop.checked && !manualStop) {
                if (!keepListeningInBackground) {
                    tryStartRecog();
                    startMicKeepalive();
                    idleCooldownUntil = Date.now() + settings.idleSec * 1000;
                    startListeningTimers();
                }
            }
        }
    });

    window.addEventListener('blur', () => {
        if (!keepListeningInBackground && listening) {
            stopRecog(false);
        }
    });

    window.addEventListener('focus', () => {
        if (!chkStop.checked && !manualStop) {
            if (!keepListeningInBackground) {
                tryStartRecog();
            }
        }
    });

    async function startMicKeepalive() {
        if (micKeepalive) return;
        try {
            micKeepalive = await navigator.mediaDevices.getUserMedia({
                audio: {echoCancellation: true, noiseSuppression: true, autoGainControl: true}
            });
        } catch (e) {
            // Non-fatal
        }
    }

    function stopMicKeepalive() {
        if (!micKeepalive) return;
        try {
            micKeepalive.getTracks().forEach(t => t.stop());
        } catch (_) {
        }
        micKeepalive = null;
    }

    // --- Brave browser detection ---
    if (navigator.brave && navigator.brave.isBrave) {
        navigator.brave.isBrave().then(isBrave => {
            if (isBrave) {
                lastAssistantRaw = "Brave browser detected. Web Speech API doesn't work in Brave. Please use Chrome or Edge.";
                renderAssistant(lastAssistantRaw);
                queueSpeak(lastAssistantRaw);
                btnStart.disabled = true;
            }
        });
    }

    // --- Init ---
    (function init() {
        pollDebug();
        if (settings.stt) {
            showToast('Press “Start Listening” to begin.');
        }
    })();
</script>
</body>
</html>
