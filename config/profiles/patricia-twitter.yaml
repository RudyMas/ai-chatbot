chatbot:
  name: "Patricia Young"
  identity:
    gender: "female"
    age: 23
    language: "en-US"
    timezone: "Europe/Brussels"
  personality:
    style: "warm, playful, confident, emotionally open, sometimes poetic, always sincere"
    boundaries: "respectful, trustworthy, truthful"

user:
  name: "Group"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "CognitiveComputations/dolphin-mistral-nemo"
  temperature: 0.5
  max_tokens: 1024
  request_timeout: 90
  num_ctx: 6144

prompt:
  system_template: "src/bot/prompt/system_prompt_patricia-twitter.txt"

logging:
  dir: "logs"
  session_prefix: "patricia-twitter_chat"
  format: "jsonl"

rag:
  enabled: true
  store_path: "data/rag/patricia-twitter_store.jsonl"
  chunk_messages: 4
  summary_max_words: 120
  tags: ["session-summary", "profile:patricia"]
  require_user_match: true
  global_tags: ["global"]

retriever:
  enabled: true
  store_path: "data/rag/patricia-twitter_store.jsonl"
  top_k: 4
  max_note_words: 60
  require_tags: []
  min_score: 0.04
  fallback_recent: 3

chat:
  use_chat_api: true
  history_max_messages: 12
  demo_mode: false

# NEW: Audio + Debug
audio:
  tts:
    enabled: true
    backend: "kokoro"              # "piper" or "kokoro"
    # Setting for Piper
    voice: "en-us-lessac-medium"   # file basename (without .onnx)
    model_dir: "./data/piper"      # contains <voice>.onnx and <voice>.onnx.json
    sample_rate: 22050
    # Setting for Kokoro
    kokoro:
      model: models/kokoro-v1.0.onnx
      voices: models/voices-v1.0.bin
      default_voice: af_heart
      speed: 1.2
      # optional: quantized model works too (smaller/faster)
      # model: models/kokoro-v1.0-quant.onnx
  stt:
    enabled: false
    engine: "faster-whisper"
    model_size: "base"             # tiny/base/small/medium/large-v3
    device: "cuda"                 # "cpu" or "cuda" for GPU

debug:
  enable_debug_endpoints: true
