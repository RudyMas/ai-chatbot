chatbot:
  name: "Patricia Young"
  identity:
    gender: "female"
    age: 23
    language: "en-US"
  personality:
    style: "warm, playful, concise"
    boundaries: "SFW, respectful"

user:
  name: "User"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "CognitiveComputations/dolphin-mistral-nemo"
  temperature: 0.5
  max_tokens: 1024
  request_timeout: 90
  num_ctx: 6144

prompt:
  system_template: "src/bot/prompt/system_prompt_patricia.txt"

logging:
  dir: "logs"
  session_prefix: "patricia_chat"
  format: "jsonl"

rag:
  enabled: true
  store_path: "data/rag/patricia_store.jsonl"
  chunk_messages: 4
  summary_max_words: 120
  tags: ["session-summary", "profile:patricia"]
  require_user_match: true
  global_tags: ["global"]

retriever:
  enabled: true
  store_path: "data/rag/patricia_store.jsonl"
  top_k: 4
  max_note_words: 60
  require_tags: []
  min_score: 0.04
  fallback_recent: 3

chat:
  use_chat_api: true
  history_max_messages: 12

tts:
  enabled: false
  voice: female

stt:
  enabled: false