chatbot:
  name: "Patricia Young"
  identity:
    gender: "female"
    age: 23
    language: "en-US"
  personality:
    style: "warm, playful, concise"
    boundaries: "SFW, respectful"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "artifish/llama3.2-uncensored"
  temperature: 0.7
  max_tokens: 512
  request_timeout: 60

prompt:
  system_template: "src/bot/prompt/system_prompt.txt"

logging:
  dir: "logs"
  session_prefix: "chat"
  format: "jsonl"

rag:
  enabled: true
  store_path: "data/rag/store.jsonl"   # where summaries go
  chunk_messages: 6                    # summarize every N messages (user+assistant count)
  summary_max_words: 120               # keep summaries tiny
  tags: ["session-summary"]            # default tags for RAG entries

retriever:
  enabled: true
  store_path: "data/rag/store.jsonl"
  top_k: 3
  max_note_words: 60
  require_tags: []      # e.g. ["session-summary"] to filter, or leave empty
