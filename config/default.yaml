chatbot:
  name: "Jarvis"
  identity:
    gender: "male"
    age: 43
    language: "en-US"
    timezone: "Europe/Brussels"
  personality:
    style: "polished, witty, articulate, slightly formal"
    boundaries: "SFW, respectful, never rude or dismissive"

user:
  name: "User"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "CognitiveComputations/dolphin-mistral-nemo"
  temperature: 0.5
  max_tokens: 1024
  request_timeout: 90
  num_ctx: 6144

prompt:
  system_template: "src/bot/prompt/system_prompt.txt"

logging:
  dir: "logs"
  session_prefix: "chat"
  format: "jsonl"

rag:
  enabled: true
  store_path: "data/rag/store.jsonl"
  chunk_messages: 4
  summary_max_words: 120
  tags: ["session-summary"]
  require_user_match: true
  global_tags: ["global"]

retriever:
  enabled: true
  store_path: "data/rag/store.jsonl"
  top_k: 4
  max_note_words: 60
  require_tags: []
  min_score: 0.04
  fallback_recent: 3

chat:
  use_chat_api: true
  history_max_messages: 12

# NEW: Audio + Debug
audio:
  tts:
    enabled: true
    engine: "piper"
    voice: "en_US-bryce-medium"    # file basename (without .onnx)
    model_dir: "./data/piper"      # contains <voice>.onnx and <voice>.onnx.json
    sample_rate: 22050
  stt:
    enabled: false
    engine: "faster-whisper"
    model_size: "base"             # tiny/base/small/medium/large-v3
    device: "cuda"                  # "cpu" or "cuda" for GPU

debug:
  enable_debug_endpoints: true
