chatbot:
  name: "Patricia Young"
  identity:
    gender: "female"
    age: 23
    language: "en-US"
  personality:
    style: "warm, playful, concise"
    boundaries: "SFW, respectful"

user:
  name: "Random User"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "CognitiveComputations/dolphin-mistral-nemo"
  temperature: 0.7
  max_tokens: 4096
  request_timeout: 60

prompt:
  system_template: "src/bot/prompt/system_prompt.txt"

logging:
  dir: "logs"
  session_prefix: "chat"
  format: "jsonl"

rag:
  enabled: true
  store_path: "data/rag/store.jsonl"
  chunk_messages: 6
  summary_max_words: 120
  tags: ["session-summary"]
  require_user_match: true
  global_tags: ["global"]

retriever:
  enabled: true
  store_path: "data/rag/store.jsonl"
  top_k: 3
  max_note_words: 60
  require_tags: []
  min_score: 0.05
  fallback_recent: 2

chat:
  use_chat_api: true
  history_max_messages: 8   # number of prior messages to send along each turn
