chatbot:
  name: "Jarvis"
  identity:
    gender: "male"
    age: 43
    language: "en-US"
    timezone: "Europe/Brussels"
  personality:
    style: "polished, witty, articulate, slightly formal"
    boundaries: "SFW, respectful, never rude or dismissive"

user:
  name: "User"

llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  model: "CognitiveComputations/dolphin-mistral-nemo"
  temperature: 0.5
  max_tokens: 1024
  request_timeout: 90
  num_ctx: 6144

prompt:
  system_template: "src/bot/prompt/system_prompt.txt"

logging:
  dir: "logs"
  session_prefix: "default"
  format: "jsonl"

rag:
  enabled: true
  store_path: "data/rag/default_store.jsonl"
  chunk_messages: 4
  summary_max_words: 120
  tags: ["session-summary"]
  require_user_match: true
  global_tags: ["global"]

retriever:
  enabled: true
  store_path: "data/rag/default_store.jsonl"
  top_k: 4
  max_note_words: 60
  require_tags: []
  min_score: 0.04
  fallback_recent: 3

chat:
  use_chat_api: true
  history_max_messages: 12
  demo_mode: false

# NEW: Audio + Debug
audio:
  tts:
    enabled: false
    backend: "kokoro"                # "piper" or "kokoro"
    # Setting for Piper
    voice: "en_US-bryce-medium"    # file basename (without .onnx)
    model_dir: "./models/piper"      # contains <voice>.onnx and <voice>.onnx.json
    sample_rate: 22050
    # Setting for Kokoro
    # Models and voices can be downloaded from: https://github.com/thewh1teagle/kokoro-onnx
    # Click on "Releases" on the right side to find the model-files to download.
    kokoro:
      model: models/kokoro-v1.0.fp16-gpu.onnx
      voices: models/voices-v1.0.bin
      default_voice: bm_lewis
      speed: 1.0
      # optional: quantized model works too (smaller/faster)
      # model: models/kokoro-quant-gpu.onnx
  stt:
    enabled: false
    engine: "faster-whisper"
    model_size: "distil-large-v3"  # tiny/base/small/medium/large-v3/distil-large-v3
    device: "cuda"                 # "cpu" or "cuda" for GPU

email:
  enabled: true

  imap:
    host: "imap.one.com"
    port: 993
    username: "jarvis@young-ai.be"
    password: "*****"
    mailbox: "INBOX"
    use_ssl: true
    poll_interval_seconds: 60

  smtp:
    host: "send.one.com"
    port: 465
    username: "jarvis@young-ai.be"
    password: "*****"
    use_tls: false
    use_ssl: true
    from_email: "jarvis@young-ai.be"
    from_name: "AI Jarvis"

  behavior:
    onboarding_subject: "Thanks for your message"
    api_base_url: "http://127.0.0.1:8000"
    active_profile: "default"
    chat_user: "Jarvis"
    chat_timeout_seconds: 30.0
    send_pending_reply: true
    pending_reply_cooldown_hours: 24
    signature: |
      Best regards,
      Jarvis
      AI Assistant

  files:
    base_dir: "data/email/jarvis"

debug:
  enable_debug_endpoints: true
